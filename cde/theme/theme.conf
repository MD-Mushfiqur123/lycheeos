# Single source of truth: /etc/cde/theme.conf
[colors]
accent = #5B4FCF
background = #F5F4F0
surface = #FFFFFF
text_primary = #1A1A1A
text_secondary = #6B6B6B

[typography]
font_sans = "Noto Sans"
font_mono = "JetBrains Mono"
