name: Lychee OS Build Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours maximum limit

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Environment Variables
      run: |
        echo "LYCHEEOS=/mnt/lycheeos" >> $GITHUB_ENV
        echo "SOURCES=/mnt/lycheeos/sources" >> $GITHUB_ENV
        echo "TOOLS=/mnt/lycheeos/tools" >> $GITHUB_ENV

    - name: Install Host Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bison flex texinfo gawk \
          libgmp-dev libmpfr-dev libmpc-dev python3 python3-pip ninja-build cmake \
          qemu-user-static debootstrap xorriso squashfs-tools grub2-common git curl wget rsync

    - name: Cache Sources and Tools
      id: cache-toolchain
      uses: actions/cache@v3
      with:
        path: |
          /mnt/lycheeos/sources
          /mnt/lycheeos/tools
        key: lycheeos-toolchain-${{ runner.os }}-${{ hashFiles('.env') }}
        restore-keys: |
          lycheeos-toolchain-${{ runner.os }}-

    - name: Prepare Directories
      run: |
        sudo mkdir -pv /mnt/lycheeos /mnt/lycheeos/sources /mnt/lycheeos/tools
        sudo chown -R $USER:$USER /mnt/lycheeos

    - name: Build Toolchain
      run: make toolchain

    - name: Build Kernel
      run: make kernel

    - name: Build ISO
      run: make iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lycheeos-iso
        path: output/*.iso
        retention-days: 7
